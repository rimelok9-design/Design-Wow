kind = "web"
previewPath = "/"
title = "DevForge — Plateforme Dev"
version = "1.0.0"
id = "artifacts/devforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26072

[services.development]
run = "pnpm --filter @workspace/devforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devforge", "run", "build" ]
publicDir = "artifacts/devforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26072"
BASE_PATH = "/"
